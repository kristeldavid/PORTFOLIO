<div id="proofModal" class="modal-overlay">
    <span class="close-btn" onclick="closeProof()">&times;</span>
    <img class="full-screen-img" id="imgSource" src="c:\Users\Administrator\Desktop\FORMS\SS IN FORMS.png">
</div>

<style>

.modal-overlay {
    display: none; 
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.95); 
    text-align: center;
}

.full-screen-img {
    margin: auto;
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    padding: 20px;
    box-sizing: border-box;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 60px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.close-btn:hover {
    color: #e191b2;
}
</style>

<script>

function openProof() {
    document.getElementById("proofModal").style.display = "flex";
    document.getElementById("proofModal").style.alignItems = "center";
    document.getElementById("proofModal").style.justifyContent = "center";
    document.body.style.overflow = "hidden"; 
}

function closeProof() {
    document.getElementById("proofModal").style.display = "none";
    document.body.style.overflow = "auto"; 
}

window.onclick = function(event) {
    let modal = document.getElementById("proofModal");
    if (event.target == modal) {
        closeProof();
    }
}
</script>
</html>
